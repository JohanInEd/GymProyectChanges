name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend build + integration tests
    runs-on: ubuntu-latest

    # The integration tests assert PostgreSQL-level behaviour (the global query filters that keep
    # one gym from reading another's data, and a Postgres-specific filtered unique index), so they
    # need a real server. Each run creates and drops its own gymsaas_test_* database.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore backend/tests/GymSaaS.IntegrationTests/GymSaaS.IntegrationTests.csproj

      - name: Build
        run: dotnet build backend/tests/GymSaaS.IntegrationTests/GymSaaS.IntegrationTests.csproj --no-restore --configuration Release

      - name: Integration tests
        env:
          # Only the host and credentials are taken from here; the tests create their own database.
          GYMSAAS_TEST_CONNECTION: "Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=postgres"
        run: >-
          dotnet test backend/tests/GymSaaS.IntegrationTests/GymSaaS.IntegrationTests.csproj
          --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: "**/TestResults/*.trx"
          if-no-files-found: ignore

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        # Mirrors the Docker build. VITE_API_BASE_URL is baked in at build time, so a placeholder is
        # enough here: this step checks the build compiles, not that it points anywhere real.
        env:
          VITE_API_BASE_URL: "https://ci.invalid"
        run: npm run build
