server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed build files (index-<hash>.js / .css) can be cached forever:
    # the filename changes whenever the content changes, so a new deploy is picked
    # up automatically without ever serving a stale asset.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # The HTML shell must always be revalidated. Otherwise a browser keeps a cached
    # index.html that points at an old (deleted) bundle after a deploy, the script
    # 404s, and the app never mounts ("Cargando React..." stays on screen).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
